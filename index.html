<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benchmark Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .scrollbar-thin::-webkit-scrollbar { width: 6px; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
        .dark .scrollbar-thin::-webkit-scrollbar-thumb { background: #4b5563; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.2s ease-out; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useMemo, useEffect, useCallback } = React;

        // ============================================================
        // SVG Icons
        // ============================================================
        const icons = {
            check: <path d="M20 6L9 17l-5-5"/>,
            x: <path d="M18 6L6 18M6 6l12 12"/>,
            clock: <><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></>,
            help: <><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></>,
            search: <><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></>,
            filter: <path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"/>,
            edit: <><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></>,
            save: <><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></>,
            close: <path d="M18 6L6 18M6 6l12 12"/>,
            chevDown: <path d="M6 9l6 6 6-6"/>,
            chevRight: <path d="M9 18l6-6-6-6"/>,
            sortAsc: <><path d="M12 5v14"/><path d="M19 12l-7 7-7-7"/></>,
            sortDesc: <><path d="M12 19V5"/><path d="M5 12l7-7 7 7"/></>,
            sort: <><path d="M7 15l5 5 5-5"/><path d="M7 9l5-5 5 5"/></>,
            file: <><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></>,
            code: <><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></>,
            brain: <><path d="M9.5 2A2.5 2.5 0 0112 4.5V5a2.5 2.5 0 014.96.44 2.5 2.5 0 012.96 3.08 2.5 2.5 0 01-.39 4.58 2.5 2.5 0 01-1.56 4.25"/><path d="M14.5 2A2.5 2.5 0 0012 4.5V5a2.5 2.5 0 00-4.96.44 2.5 2.5 0 00-2.96 3.08 2.5 2.5 0 00.39 4.58 2.5 2.5 0 001.56 4.25"/></>,
            bar: <><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></>,
            award: <><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></>,
            sun: <><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></>,
            moon: <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>,
            expand: <><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></>,
        };

        const Icon = ({ name, className = "w-4 h-4" }) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                {icons[name]}
            </svg>
        );

        // ============================================================
        // Shared constants
        // ============================================================
        const DIMENSIONS = [
            { key: "task_alignment", label: "Task Alignment", short: "Align" },
            { key: "execution_validity", label: "Execution Validity", short: "Exec" },
            { key: "output_completeness", label: "Output Completeness", short: "Output" },
            { key: "result_fidelity", label: "Result Fidelity", short: "Fidelity" },
            { key: "visualization_quality", label: "Visualization", short: "Visual" },
            { key: "code_craftsmanship", label: "Code Craft", short: "Craft" },
        ];

        const DIM_COLORS = ["#6366f1","#06b6d4","#10b981","#f59e0b","#ef4444","#8b5cf6"];

        const statusConfig = {
            success:   { bg: "bg-emerald-100 dark:bg-emerald-900", text: "text-emerald-700 dark:text-emerald-300", icon: "check", label: "Success" },
            failed:    { bg: "bg-red-100 dark:bg-red-900",         text: "text-red-700 dark:text-red-300",         icon: "x",     label: "Failed" },
            pending:   { bg: "bg-amber-100 dark:bg-amber-900",     text: "text-amber-700 dark:text-amber-300",     icon: "clock", label: "Pending" },
            no_code:   { bg: "bg-gray-100 dark:bg-gray-700",       text: "text-gray-500 dark:text-gray-400",       icon: "help",  label: "No Code" },
            completed: { bg: "bg-blue-100 dark:bg-blue-900",       text: "text-blue-700 dark:text-blue-300",       icon: "check", label: "Done" },
        };

        // ============================================================
        // Reusable small components
        // ============================================================
        const StatusBadge = ({ status }) => {
            const c = statusConfig[status] || statusConfig.pending;
            return (
                <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium ${c.bg} ${c.text}`}>
                    <Icon name={c.icon} className="w-3 h-3"/> {c.label}
                </span>
            );
        };

        const ScoreBadge = ({ score }) => {
            if (score === null || score === undefined) return <span className="text-xs text-gray-400 dark:text-gray-500">—</span>;
            const color = score >= 8 ? "text-emerald-600 bg-emerald-50 ring-emerald-200 dark:text-emerald-400 dark:bg-emerald-950 dark:ring-emerald-800"
                : score >= 6 ? "text-amber-600 bg-amber-50 ring-amber-200 dark:text-amber-400 dark:bg-amber-950 dark:ring-amber-800"
                : "text-red-600 bg-red-50 ring-red-200 dark:text-red-400 dark:bg-red-950 dark:ring-red-800";
            return <span className={`inline-flex items-center justify-center w-7 h-7 rounded-full text-xs font-bold ring-1 ${color}`}>{score}</span>;
        };

        const ScoreBar = ({ label, score, max = 10, rationale, expanded, onToggle }) => {
            if (score === null || score === undefined) return null;
            const pct = (score / max) * 100;
            const color = score >= 8 ? "bg-emerald-400" : score >= 6 ? "bg-amber-400" : "bg-red-400";
            return (
                <div>
                    <div className="flex items-center gap-2 cursor-pointer" onClick={onToggle}>
                        <div className="w-32 text-xs text-gray-500 dark:text-gray-400 text-right truncate">{label}</div>
                        <div className="flex-1 h-4 bg-gray-100 dark:bg-gray-700 rounded-full overflow-hidden">
                            <div className={`h-full rounded-full ${color}`} style={{width: `${pct}%`, transition: "width 0.4s ease"}}/>
                        </div>
                        <div className="w-6 text-xs font-semibold text-gray-600 dark:text-gray-300 text-right">{score}</div>
                        {rationale && <Icon name={expanded ? "chevDown" : "chevRight"} className="w-3 h-3 text-gray-400"/>}
                    </div>
                    {expanded && rationale && (
                        <div className="ml-36 mr-10 mt-1 mb-2 text-xs text-gray-500 dark:text-gray-400 leading-relaxed bg-gray-50 dark:bg-gray-800 rounded-lg px-3 py-2 fade-in">
                            {rationale}
                        </div>
                    )}
                </div>
            );
        };

        const MiniProgress = ({ value, total, color = "bg-emerald-400" }) => {
            const pct = total > 0 ? (value / total) * 100 : 0;
            return (
                <div className="w-full h-1.5 bg-gray-100 dark:bg-gray-700 rounded-full mt-2 overflow-hidden">
                    <div className={`h-full rounded-full ${color}`} style={{width: `${pct}%`, transition: "width 0.5s ease"}}/>
                </div>
            );
        };

        const StatCard = ({ label, value, sub, iconName, color, progress }) => (
            <div className="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4 hover:shadow-md transition-shadow">
                <div className="flex items-center gap-3">
                    <div className={`w-10 h-10 rounded-lg flex items-center justify-center text-white ${color}`}>
                        <Icon name={iconName} className="w-5 h-5"/>
                    </div>
                    <div className="flex-1">
                        <div className="text-2xl font-bold text-gray-800 dark:text-gray-100">{value}</div>
                        <div className="text-xs text-gray-500 dark:text-gray-400">{label}</div>
                    </div>
                </div>
                {sub && <div className="text-xs text-gray-400 dark:text-gray-500 mt-2">{sub}</div>}
                {progress && <MiniProgress {...progress}/>}
            </div>
        );

        // ============================================================
        // Donut chart
        // ============================================================
        const DonutChart = ({ segments, size = 120, thickness = 20, label }) => {
            const radius = (size - thickness) / 2;
            const circumference = 2 * Math.PI * radius;
            const total = segments.reduce((s, seg) => s + seg.value, 0);
            let accumulated = 0;
            return (
                <div className="flex flex-col items-center gap-2">
                    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
                        <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke="currentColor" className="text-gray-100 dark:text-gray-700" strokeWidth={thickness}/>
                        {segments.map((seg, i) => {
                            const pct = total > 0 ? seg.value / total : 0;
                            const dashLength = circumference * pct;
                            const dashOffset = circumference * (0.25 - accumulated);
                            accumulated += pct;
                            return pct > 0 ? (
                                <circle key={i} cx={size/2} cy={size/2} r={radius} fill="none"
                                    stroke={seg.color} strokeWidth={thickness}
                                    strokeDasharray={`${dashLength} ${circumference - dashLength}`}
                                    strokeDashoffset={dashOffset}
                                    style={{transition: "stroke-dasharray 0.5s ease"}}/>
                            ) : null;
                        })}
                        <text x={size/2} y={size/2 - 6} textAnchor="middle" className="text-lg font-bold fill-gray-700 dark:fill-gray-200">{total}</text>
                        <text x={size/2} y={size/2 + 10} textAnchor="middle" className="text-xs fill-gray-400">{label}</text>
                    </svg>
                    <div className="flex flex-wrap justify-center gap-x-3 gap-y-1">
                        {segments.map((seg, i) => (
                            <span key={i} className="flex items-center gap-1 text-xs text-gray-500 dark:text-gray-400">
                                <span className="w-2 h-2 rounded-full inline-block" style={{background: seg.color}}/> {seg.label} ({seg.value})
                            </span>
                        ))}
                    </div>
                </div>
            );
        };

        // ============================================================
        // SVG Histogram
        // ============================================================
        const Histogram = ({ data, title, width = 400, height = 180, color = "#6366f1" }) => {
            const bins = Array(10).fill(0);
            data.forEach(v => { if (v >= 1 && v <= 10) bins[v - 1]++; });
            const maxCount = Math.max(...bins, 1);
            const pad = { top: 24, right: 16, bottom: 28, left: 32 };
            const cw = width - pad.left - pad.right;
            const ch = height - pad.top - pad.bottom;
            const barW = cw / 10 * 0.7;
            const gap = cw / 10 * 0.3;

            return (
                <div>
                    {title && <div className="text-xs font-semibold text-gray-600 dark:text-gray-300 mb-2">{title}</div>}
                    <svg width="100%" viewBox={`0 0 ${width} ${height}`} className="overflow-visible">
                        {bins.map((count, i) => {
                            const barH = (count / maxCount) * ch;
                            const x = pad.left + i * (cw / 10) + gap / 2;
                            const y = pad.top + ch - barH;
                            return (
                                <g key={i}>
                                    <rect x={x} y={y} width={barW} height={barH} rx={2} fill={color} opacity={0.8}/>
                                    {count > 0 && <text x={x + barW/2} y={y - 4} textAnchor="middle" className="text-xs fill-gray-500 dark:fill-gray-400" style={{fontSize:9}}>{count}</text>}
                                    <text x={x + barW/2} y={pad.top + ch + 14} textAnchor="middle" className="fill-gray-400" style={{fontSize:9}}>{i+1}</text>
                                </g>
                            );
                        })}
                        <line x1={pad.left} y1={pad.top + ch} x2={pad.left + cw} y2={pad.top + ch} stroke="currentColor" className="text-gray-200 dark:text-gray-600" strokeWidth={1}/>
                    </svg>
                </div>
            );
        };

        // ============================================================
        // SVG Line chart
        // ============================================================
        const LineChart = ({ series, title, width = 600, height = 220 }) => {
            const pad = { top: 24, right: 24, bottom: 28, left: 36 };
            const cw = width - pad.left - pad.right;
            const ch = height - pad.top - pad.bottom;

            const maxLen = Math.max(...series.map(s => s.data.length), 1);
            const allVals = series.flatMap(s => s.data);
            const minV = Math.min(...allVals, 0);
            const maxV = Math.max(...allVals, 10);
            const range = maxV - minV || 1;

            const toX = i => pad.left + (i / Math.max(maxLen - 1, 1)) * cw;
            const toY = v => pad.top + ch - ((v - minV) / range) * ch;

            const gridLines = [2, 4, 6, 8, 10].filter(v => v >= minV && v <= maxV);

            return (
                <div>
                    {title && <div className="text-xs font-semibold text-gray-600 dark:text-gray-300 mb-2">{title}</div>}
                    <svg width="100%" viewBox={`0 0 ${width} ${height}`} className="overflow-visible">
                        {gridLines.map(v => (
                            <g key={v}>
                                <line x1={pad.left} y1={toY(v)} x2={pad.left + cw} y2={toY(v)} stroke="currentColor" className="text-gray-100 dark:text-gray-700" strokeWidth={1}/>
                                <text x={pad.left - 6} y={toY(v) + 3} textAnchor="end" className="fill-gray-400" style={{fontSize:9}}>{v}</text>
                            </g>
                        ))}
                        <line x1={pad.left} y1={pad.top + ch} x2={pad.left + cw} y2={pad.top + ch} stroke="currentColor" className="text-gray-200 dark:text-gray-600" strokeWidth={1}/>
                        {series.map((s, si) => {
                            if (s.data.length < 2) return null;
                            const points = s.data.map((v, i) => `${toX(i)},${toY(v)}`).join(" ");
                            return (
                                <g key={si}>
                                    <polyline points={points} fill="none" stroke={s.color} strokeWidth={1.5} strokeLinejoin="round"/>
                                    {s.data.map((v, i) => (
                                        <circle key={i} cx={toX(i)} cy={toY(v)} r={2} fill={s.color}/>
                                    ))}
                                </g>
                            );
                        })}
                    </svg>
                    <div className="flex flex-wrap gap-x-4 gap-y-1 mt-1">
                        {series.map((s, i) => (
                            <span key={i} className="flex items-center gap-1 text-xs text-gray-500 dark:text-gray-400">
                                <span className="w-3 h-0.5 inline-block rounded" style={{background: s.color}}/> {s.label}
                            </span>
                        ))}
                    </div>
                </div>
            );
        };

        // ============================================================
        // Source bar (revised: average score per source)
        // ============================================================
        const SourceBar = ({ name, count, avgScore, onClick, active }) => {
            const pct = avgScore !== null ? (avgScore / 10) * 100 : 0;
            const color = avgScore >= 8 ? "bg-emerald-400" : avgScore >= 6 ? "bg-amber-400" : avgScore !== null ? "bg-red-400" : "bg-gray-200 dark:bg-gray-600";
            return (
                <div className={`flex items-center gap-3 py-1.5 px-2 rounded-lg cursor-pointer transition-colors ${active ? "bg-indigo-50 dark:bg-indigo-950" : "hover:bg-gray-50 dark:hover:bg-gray-800"}`} onClick={onClick}>
                    <div className="w-28 text-xs font-medium text-gray-700 dark:text-gray-300 truncate">{name}</div>
                    <div className="flex-1 h-5 bg-gray-100 dark:bg-gray-700 rounded-full overflow-hidden">
                        <div className={`h-full rounded-full ${color}`} style={{width: `${pct}%`, transition: "width 0.4s"}}/>
                    </div>
                    <div className="w-16 text-xs text-gray-500 dark:text-gray-400 text-right font-mono">
                        {avgScore !== null ? `${avgScore} avg` : "—"} · {count}
                    </div>
                </div>
            );
        };

        // ============================================================
        // Edit modal
        // ============================================================
        const EditModal = ({ task, onSave, onClose }) => {
            const [text, setText] = useState(task.task_text);
            const [solvable, setSolvable] = useState(task.solvable);
            return (
                <div className="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50 p-4 fade-in">
                    <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-full max-w-lg p-6">
                        <div className="flex items-center justify-between mb-4">
                            <h3 className="text-lg font-semibold text-gray-800 dark:text-gray-100">Edit Task</h3>
                            <button onClick={onClose} className="p-1 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg"><Icon name="close" className="w-5 h-5 text-gray-400"/></button>
                        </div>
                        <div className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Task ID</label>
                                <div className="text-sm text-gray-800 dark:text-gray-200 font-mono bg-gray-50 dark:bg-gray-700 px-3 py-2 rounded-lg">{task.task_ID}</div>
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Source</label>
                                <div className="text-sm text-gray-800 dark:text-gray-200 bg-gray-50 dark:bg-gray-700 px-3 py-2 rounded-lg">{task.source}</div>
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Description</label>
                                <textarea value={text} onChange={e => setText(e.target.value)} rows={4}
                                    className="w-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 rounded-lg px-3 py-2 text-sm text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-400 resize-none"/>
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Solvable</label>
                                <select value={solvable} onChange={e => setSolvable(e.target.value)}
                                    className="border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 rounded-lg px-3 py-2 text-sm text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-400">
                                    <option value="ACCEPT">ACCEPT</option>
                                    <option value="REJECT">REJECT</option>
                                    <option value="POSSIBLE">POSSIBLE</option>
                                </select>
                            </div>
                        </div>
                        <div className="flex justify-end gap-2 mt-6">
                            <button onClick={onClose} className="px-4 py-2 text-sm text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg">Cancel</button>
                            <button onClick={() => { onSave({...task, task_text: text, solvable}); onClose(); }}
                                className="px-4 py-2 text-sm text-white bg-blue-500 hover:bg-blue-600 rounded-lg flex items-center gap-1">
                                <Icon name="save" className="w-4 h-4"/> Save
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // ============================================================
        // Task row
        // ============================================================
        const TaskRow = ({ task, expanded, onToggle, onEdit }) => {
            const [expandedDim, setExpandedDim] = useState(null);
            return (
                <div className="border-b border-gray-100 dark:border-gray-700 last:border-0">
                    <div className="flex items-center gap-3 px-4 py-2.5 hover:bg-gray-50 dark:hover:bg-gray-800 cursor-pointer transition-colors" onClick={onToggle}>
                        <div className="w-5 text-gray-400"><Icon name={expanded ? "chevDown" : "chevRight"} className="w-4 h-4"/></div>
                        <div className="w-48 font-mono text-xs text-gray-700 dark:text-gray-300 truncate">{task.task_ID}</div>
                        <div className="w-28">
                            <span className="inline-block px-2 py-0.5 bg-indigo-50 dark:bg-indigo-950 text-indigo-600 dark:text-indigo-400 rounded text-xs font-medium">{task.source}</span>
                        </div>
                        <div className="flex-1 text-xs text-gray-600 dark:text-gray-400 truncate">{task.task_text}</div>
                        <div className="w-20 flex justify-center"><StatusBadge status={task.ref_status}/></div>
                        <div className="w-20 flex justify-center"><StatusBadge status={task.agent_status}/></div>
                        <div className="w-20 flex justify-center"><StatusBadge status={task.eval_status}/></div>
                        <div className="w-10 flex justify-center"><ScoreBadge score={task.eval_score}/></div>
                        <button onClick={e => { e.stopPropagation(); onEdit(task); }}
                            className="p-1.5 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-lg text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition-colors">
                            <Icon name="edit" className="w-3.5 h-3.5"/>
                        </button>
                    </div>
                    {expanded && (
                        <div className="px-4 py-4 bg-gradient-to-b from-gray-50 to-white dark:from-gray-800 dark:to-gray-850 border-t border-gray-100 dark:border-gray-700 fade-in">
                            <div className="grid grid-cols-3 gap-6 ml-8">
                                <div>
                                    <div className="text-xs font-semibold text-gray-500 dark:text-gray-400 mb-2">Description</div>
                                    <p className="text-xs text-gray-700 dark:text-gray-300 leading-relaxed">{task.task_text}</p>
                                    <div className="mt-3 space-y-1.5">
                                        <div className="flex items-center gap-2 text-xs">
                                            <span className="text-gray-400 w-20">Solvable</span>
                                            <span className="text-gray-700 dark:text-gray-300">{task.solvable}</span>
                                        </div>
                                        <div className="flex items-center gap-2 text-xs">
                                            <span className="text-gray-400 w-20">Reference</span>
                                            <span className="text-gray-700 dark:text-gray-300">{task.has_reference ? "Available" : "None"}</span>
                                        </div>
                                    </div>
                                </div>
                                <div>
                                    <div className="text-xs font-semibold text-gray-500 dark:text-gray-400 mb-2">Pipeline Status</div>
                                    <div className="space-y-2">
                                        {["ref_status","agent_status","eval_status"].map(k => (
                                            <div key={k} className="flex items-center justify-between px-3 py-2 bg-white dark:bg-gray-800 rounded-lg border border-gray-100 dark:border-gray-700">
                                                <span className="text-xs text-gray-500 dark:text-gray-400">{k.replace("_status","").replace(/^\w/,c=>c.toUpperCase())}</span>
                                                <StatusBadge status={task[k]}/>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div>
                                    <div className="text-xs font-semibold text-gray-500 dark:text-gray-400 mb-2">Evaluation Scores</div>
                                    {task.eval_score !== null ? (
                                        <div className="space-y-1.5">
                                            {DIMENSIONS.map(dim => (
                                                <ScoreBar key={dim.key} label={dim.label}
                                                    score={task.eval_dimensions?.[dim.key]}
                                                    rationale={task.eval_rationales?.[dim.key]}
                                                    expanded={expandedDim === dim.key}
                                                    onToggle={() => setExpandedDim(expandedDim === dim.key ? null : dim.key)}/>
                                            ))}
                                            <div className="flex items-center gap-2 mt-3 pt-2 border-t border-gray-100 dark:border-gray-700">
                                                <span className="text-xs font-semibold text-gray-500 dark:text-gray-400">Overall</span>
                                                <ScoreBadge score={task.eval_score}/>
                                            </div>
                                            {task.eval_summary && (
                                                <div className="mt-2 text-xs text-gray-500 dark:text-gray-400 leading-relaxed bg-gray-50 dark:bg-gray-800 rounded-lg px-3 py-2">
                                                    {task.eval_summary}
                                                </div>
                                            )}
                                        </div>
                                    ) : (
                                        <div className="text-xs text-gray-400 italic py-4">Not yet evaluated</div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ============================================================
        // Tab button
        // ============================================================
        const TabBtn = ({ active, onClick, children }) => (
            <button onClick={onClick}
                className={`px-4 py-2 text-sm font-medium rounded-lg transition-colors ${active ? "bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-100 shadow-sm" : "text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-300"}`}>
                {children}
            </button>
        );

        // ============================================================
        // Main dashboard
        // ============================================================
        function BenchmarkDashboard() {
            const [tasks, setTasks] = useState([]);
            const [loading, setLoading] = useState(true);
            const [dataTime, setDataTime] = useState("");
            const [tab, setTab] = useState("overview");
            const [dark, setDark] = useState(() => {
                try { return localStorage.getItem("dashboard_dark") === "true"; } catch { return false; }
            });
            const [searchQuery, setSearchQuery] = useState("");
            const [sourceFilter, setSourceFilter] = useState("all");
            const [refFilter, setRefFilter] = useState("all");
            const [agentFilter, setAgentFilter] = useState("all");
            const [evalFilter, setEvalFilter] = useState("all");
            const [expandedId, setExpandedId] = useState(null);
            const [editingTask, setEditingTask] = useState(null);
            const [sortField, setSortField] = useState(null);
            const [sortDir, setSortDir] = useState("asc");
            const [visibleDims, setVisibleDims] = useState(new Set(["overall"]));

            useEffect(() => {
                fetch("dashboard_data.json?t=" + Date.now())
                    .then(r => r.json())
                    .then(data => { setTasks(data.tasks); setDataTime(data.generated_at || ""); setLoading(false); })
                    .catch(() => setLoading(false));
            }, []);

            // Derived data
            const sources = useMemo(() => {
                const map = {};
                tasks.forEach(t => {
                    if (!map[t.source]) map[t.source] = { count: 0, refSuccess: 0, agentSuccess: 0, evalDone: 0, scoreSum: 0, scoreCount: 0 };
                    map[t.source].count++;
                    if (t.ref_status === "success") map[t.source].refSuccess++;
                    if (t.agent_status === "success") map[t.source].agentSuccess++;
                    if (t.eval_status === "completed") map[t.source].evalDone++;
                    if (t.eval_score !== null) { map[t.source].scoreSum += t.eval_score; map[t.source].scoreCount++; }
                });
                Object.values(map).forEach(v => { v.avgScore = v.scoreCount > 0 ? Math.round(v.scoreSum / v.scoreCount * 10) / 10 : null; });
                return map;
            }, [tasks]);

            const stats = useMemo(() => {
                const s = { total: tasks.length, refSuccess: 0, refFailed: 0, refPending: 0, refNoCode: 0, agentSuccess: 0, agentFailed: 0, agentPending: 0, evalDone: 0, evalPending: 0, avgScore: 0 };
                let scoreSum = 0, scoreCount = 0;
                tasks.forEach(t => {
                    if (t.ref_status === "success") s.refSuccess++; else if (t.ref_status === "failed") s.refFailed++; else if (t.ref_status === "no_code") s.refNoCode++; else s.refPending++;
                    if (t.agent_status === "success") s.agentSuccess++; else if (t.agent_status === "failed") s.agentFailed++; else s.agentPending++;
                    if (t.eval_status === "completed") { s.evalDone++; if (t.eval_score !== null) { scoreSum += t.eval_score; scoreCount++; } } else s.evalPending++;
                });
                s.avgScore = scoreCount > 0 ? (scoreSum / scoreCount).toFixed(1) : "—";
                return s;
            }, [tasks]);

            const evaluatedTasks = useMemo(() =>
                tasks.filter(t => t.eval_score !== null && t.eval_completed_at)
                    .sort((a, b) => a.eval_completed_at - b.eval_completed_at),
            [tasks]);

            const overallScores = useMemo(() => evaluatedTasks.map(t => t.eval_score), [evaluatedTasks]);

            const trendSeries = useMemo(() => {
                const result = [];
                if (visibleDims.has("overall")) {
                    let sum = 0;
                    result.push({ label: "Overall (cumulative avg)", color: "#374151", data: overallScores.map((v, i) => { sum += v; return Math.round(sum / (i + 1) * 10) / 10; }) });
                }
                DIMENSIONS.forEach((dim, di) => {
                    if (visibleDims.has(dim.key)) {
                        let sum = 0, count = 0;
                        result.push({
                            label: dim.short, color: DIM_COLORS[di],
                            data: evaluatedTasks.map(t => { const v = t.eval_dimensions?.[dim.key]; if (v != null) { sum += v; count++; } return count > 0 ? Math.round(sum / count * 10) / 10 : null; }).filter(v => v !== null),
                        });
                    }
                });
                return result;
            }, [evaluatedTasks, overallScores, visibleDims]);

            const toggleDim = (key) => setVisibleDims(prev => {
                const next = new Set(prev);
                if (next.has(key)) next.delete(key); else next.add(key);
                return next;
            });

            const filtered = useMemo(() => {
                let result = tasks;
                if (searchQuery) { const q = searchQuery.toLowerCase(); result = result.filter(t => t.task_ID.toLowerCase().includes(q) || t.task_text.toLowerCase().includes(q)); }
                if (sourceFilter !== "all") result = result.filter(t => t.source === sourceFilter);
                if (refFilter !== "all") result = result.filter(t => t.ref_status === refFilter);
                if (agentFilter !== "all") result = result.filter(t => t.agent_status === agentFilter);
                if (evalFilter !== "all") result = result.filter(t => t.eval_status === evalFilter);
                if (sortField) {
                    result = [...result].sort((a, b) => {
                        let va = a[sortField], vb = b[sortField];
                        if (va == null && vb == null) return 0; if (va == null) return 1; if (vb == null) return -1;
                        if (typeof va === "string") return sortDir === "asc" ? va.localeCompare(vb) : vb.localeCompare(va);
                        return sortDir === "asc" ? va - vb : vb - va;
                    });
                }
                return result;
            }, [tasks, searchQuery, sourceFilter, refFilter, agentFilter, evalFilter, sortField, sortDir]);

            const handleSort = (field) => { if (sortField === field) setSortDir(d => d === "asc" ? "desc" : "asc"); else { setSortField(field); setSortDir("asc"); } };
            const handleSave = (updated) => setTasks(prev => prev.map(t => t.task_ID === updated.task_ID ? updated : t));

            const SortHeader = ({ field, children, className }) => (
                <button onClick={() => handleSort(field)} className={`flex items-center gap-1 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide hover:text-gray-700 dark:hover:text-gray-300 ${className || ""}`}>
                    {children} <Icon name={sortField === field ? (sortDir === "asc" ? "sortAsc" : "sortDesc") : "sort"} className="w-3 h-3"/>
                </button>
            );

            if (loading) return <div className="min-h-screen bg-gray-50 flex items-center justify-center"><div className="text-gray-400 text-sm">Loading...</div></div>;

            return (
                <div className={dark ? "dark" : ""}>
                    <div className="min-h-screen bg-gray-50 dark:bg-gray-900 p-6 transition-colors">
                        <div className="max-w-7xl mx-auto space-y-6">
                            {/* Header */}
                            <div className="flex items-center justify-between">
                                <div>
                                    <h1 className="text-2xl font-bold text-gray-800 dark:text-gray-100">Benchmark Dashboard</h1>
                                    <p className="text-sm text-gray-500 dark:text-gray-400 mt-1">GeoAnalystBench Multi-Agent Evaluation System</p>
                                </div>
                                <div className="flex items-center gap-3">
                                    <div className="text-right">
                                        <div className="text-xs text-gray-400">{tasks.length} tasks · {Object.keys(sources).length} collections</div>
                                        {dataTime && <div className="text-xs text-gray-300 dark:text-gray-600 mt-0.5">updated {new Date(dataTime).toLocaleString()}</div>}
                                    </div>
                                    <button onClick={() => setDark(d => { const next = !d; try { localStorage.setItem("dashboard_dark", next); } catch {} return next; })} className="p-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-500 dark:text-gray-400 transition-colors">
                                        <Icon name={dark ? "sun" : "moon"} className="w-5 h-5"/>
                                    </button>
                                </div>
                            </div>

                            {/* Tabs */}
                            <div className="flex items-center gap-1 bg-gray-100 dark:bg-gray-800 rounded-xl p-1 w-fit">
                                <TabBtn active={tab === "overview"} onClick={() => setTab("overview")}>Overview</TabBtn>
                                <TabBtn active={tab === "scores"} onClick={() => setTab("scores")}>Scores</TabBtn>
                                <TabBtn active={tab === "tasks"} onClick={() => setTab("tasks")}>Tasks</TabBtn>
                            </div>

                            {/* ==================== OVERVIEW TAB ==================== */}
                            {tab === "overview" && (
                                <div className="space-y-6 fade-in">
                                    <div className="grid grid-cols-12 gap-4">
                                        <div className="col-span-8 grid grid-cols-2 lg:grid-cols-4 gap-3">
                                            <StatCard label="Total Tasks" value={stats.total} iconName="file" color="bg-slate-500"/>
                                            <StatCard label="Ref Success" value={stats.refSuccess} sub={`${stats.refFailed} failed · ${stats.refNoCode} no code`} iconName="code" color="bg-emerald-500" progress={{value: stats.refSuccess, total: stats.total, color: "bg-emerald-400"}}/>
                                            <StatCard label="Agent Success" value={stats.agentSuccess} sub={`${stats.agentFailed} failed · ${stats.agentPending} pending`} iconName="brain" color="bg-blue-500" progress={{value: stats.agentSuccess, total: stats.total, color: "bg-blue-400"}}/>
                                            <StatCard label="Avg Score" value={stats.avgScore} sub={`${stats.evalDone} evaluated`} iconName="award" color="bg-amber-500"/>
                                        </div>
                                        <div className="col-span-4 bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4 flex items-center justify-center">
                                            <DonutChart label="Pipeline" segments={[
                                                { label: "Ref✓", value: stats.refSuccess, color: "#34d399" },
                                                { label: "Agent✓", value: stats.agentSuccess, color: "#60a5fa" },
                                                { label: "Eval✓", value: stats.evalDone, color: "#a78bfa" },
                                                { label: "Pending", value: Math.max(0, stats.total - Math.max(stats.refSuccess, stats.agentSuccess, stats.evalDone)), color: "#e5e7eb" },
                                            ]}/>
                                        </div>
                                    </div>

                                    <div className="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4">
                                        <h3 className="text-sm font-semibold text-gray-700 dark:text-gray-300 mb-3">Source Distribution (avg score)</h3>
                                        <div className="space-y-0.5">
                                            {Object.entries(sources).map(([name, data]) => (
                                                <SourceBar key={name} name={name} count={data.count} avgScore={data.avgScore}
                                                    active={sourceFilter === name}
                                                    onClick={() => { setSourceFilter(sourceFilter === name ? "all" : name); setTab("tasks"); }}/>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* ==================== SCORES TAB ==================== */}
                            {tab === "scores" && (
                                <div className="space-y-6 fade-in">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4">
                                            <Histogram data={overallScores} title="Overall Score Distribution" color="#6366f1"/>
                                        </div>
                                        <div className="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4">
                                            <div className="flex items-center justify-between mb-2">
                                                <div className="text-xs font-semibold text-gray-600 dark:text-gray-300">Score Trend (cumulative average)</div>
                                            </div>
                                            <div className="flex flex-wrap gap-2 mb-3">
                                                <label className="flex items-center gap-1 text-xs text-gray-500 dark:text-gray-400 cursor-pointer">
                                                    <input type="checkbox" checked={visibleDims.has("overall")} onChange={() => toggleDim("overall")} className="rounded"/>
                                                    Overall
                                                </label>
                                                {DIMENSIONS.map((dim, i) => (
                                                    <label key={dim.key} className="flex items-center gap-1 text-xs text-gray-500 dark:text-gray-400 cursor-pointer">
                                                        <input type="checkbox" checked={visibleDims.has(dim.key)} onChange={() => toggleDim(dim.key)} className="rounded"/>
                                                        <span className="w-2 h-2 rounded-full inline-block" style={{background: DIM_COLORS[i]}}/> {dim.short}
                                                    </label>
                                                ))}
                                            </div>
                                            {trendSeries.length > 0 ? <LineChart series={trendSeries}/> : <div className="text-xs text-gray-400 py-8 text-center">Select at least one series</div>}
                                        </div>
                                    </div>

                                    <div className="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4">
                                        <h3 className="text-sm font-semibold text-gray-700 dark:text-gray-300 mb-4">Per-Dimension Distribution</h3>
                                        <div className="grid grid-cols-2 lg:grid-cols-3 gap-4">
                                            {DIMENSIONS.map((dim, i) => {
                                                const scores = evaluatedTasks.map(t => t.eval_dimensions?.[dim.key]).filter(v => v != null);
                                                return <Histogram key={dim.key} data={scores} title={dim.label} color={DIM_COLORS[i]}/>;
                                            })}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* ==================== TASKS TAB ==================== */}
                            {tab === "tasks" && (
                                <div className="space-y-4 fade-in">
                                    <div className="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4">
                                        <div className="flex flex-wrap items-center gap-3">
                                            <div className="relative flex-1 min-w-48">
                                                <Icon name="search" className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"/>
                                                <input type="text" placeholder="Search by ID or description..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)}
                                                    className="w-full pl-9 pr-3 py-2 border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 rounded-lg text-sm text-gray-800 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-400"/>
                                            </div>
                                            <div className="flex items-center gap-1.5">
                                                <Icon name="filter" className="w-4 h-4 text-gray-400"/>
                                                <select value={sourceFilter} onChange={e => setSourceFilter(e.target.value)} className="border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 rounded-lg px-2 py-2 text-xs text-gray-700 dark:text-gray-300">
                                                    <option value="all">All Sources</option>
                                                    {Object.keys(sources).map(s => <option key={s} value={s}>{s}</option>)}
                                                </select>
                                                <select value={refFilter} onChange={e => setRefFilter(e.target.value)} className="border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 rounded-lg px-2 py-2 text-xs text-gray-700 dark:text-gray-300">
                                                    <option value="all">Ref: All</option>
                                                    <option value="success">Ref: Success</option>
                                                    <option value="failed">Ref: Failed</option>
                                                    <option value="pending">Ref: Pending</option>
                                                    <option value="no_code">Ref: No Code</option>
                                                </select>
                                                <select value={agentFilter} onChange={e => setAgentFilter(e.target.value)} className="border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 rounded-lg px-2 py-2 text-xs text-gray-700 dark:text-gray-300">
                                                    <option value="all">Agent: All</option>
                                                    <option value="success">Agent: Success</option>
                                                    <option value="failed">Agent: Failed</option>
                                                    <option value="pending">Agent: Pending</option>
                                                </select>
                                                <select value={evalFilter} onChange={e => setEvalFilter(e.target.value)} className="border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 rounded-lg px-2 py-2 text-xs text-gray-700 dark:text-gray-300">
                                                    <option value="all">Eval: All</option>
                                                    <option value="completed">Eval: Done</option>
                                                    <option value="pending">Eval: Pending</option>
                                                </select>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-4 mt-2 text-xs text-gray-400 dark:text-gray-500">
                                            <span>Showing {filtered.length} of {tasks.length}</span>
                                        </div>
                                    </div>

                                    <div className="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 overflow-hidden">
                                        <div className="flex items-center gap-3 px-4 py-3 bg-gray-50 dark:bg-gray-850 border-b border-gray-200 dark:border-gray-700">
                                            <div className="w-5"/>
                                            <SortHeader field="task_ID" className="w-48">Task ID</SortHeader>
                                            <SortHeader field="source" className="w-28">Source</SortHeader>
                                            <div className="flex-1 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide">Description</div>
                                            <SortHeader field="ref_status" className="w-20 justify-center">Ref</SortHeader>
                                            <SortHeader field="agent_status" className="w-20 justify-center">Agent</SortHeader>
                                            <SortHeader field="eval_status" className="w-20 justify-center">Eval</SortHeader>
                                            <SortHeader field="eval_score" className="w-10 justify-center">Score</SortHeader>
                                            <div className="w-8"/>
                                        </div>
                                        <div className="overflow-y-auto scrollbar-thin" style={{maxHeight:"520px"}}>
                                            {filtered.length === 0 ? (
                                                <div className="py-16 text-center text-sm text-gray-400 dark:text-gray-500">No tasks match the current filters</div>
                                            ) : filtered.map(task => (
                                                <TaskRow key={task.task_ID} task={task}
                                                    expanded={expandedId === task.task_ID}
                                                    onToggle={() => setExpandedId(expandedId === task.task_ID ? null : task.task_ID)}
                                                    onEdit={setEditingTask}/>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                    {editingTask && <EditModal task={editingTask} onSave={handleSave} onClose={() => setEditingTask(null)}/>}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<BenchmarkDashboard />);
    </script>
</body>
</html>
